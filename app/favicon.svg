<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" fill="#0d100a"/>
  <!-- Ears -->
  <circle cx="2.5" cy="19" r="3.5" fill="#b8d42a"/>
  <circle cx="29.5" cy="19" r="3.5" fill="#b8d42a"/>
  <!-- Sagittal crest -->
  <ellipse cx="16" cy="6" rx="5" ry="5" fill="#b8d42a"/>
  <!-- Wide skull -->
  <ellipse cx="16" cy="20" rx="13" ry="12" fill="#b8d42a"/>
  <!-- Massive brow ridge — completely buries eye region, NO eye circles -->
  <ellipse cx="16" cy="14" rx="12" ry="7" fill="#0d100a" opacity="0.78"/>
  <!-- Wide flat nose -->
  <ellipse cx="16" cy="22" rx="6.5" ry="4" fill="#0d100a" opacity="0.38"/>
  <!-- Nostrils — horizontal, clearly NOT eyes -->
  <ellipse cx="12.5" cy="22.5" rx="2.8" ry="1.6" fill="#0d100a" opacity="0.9"/>
  <ellipse cx="19.5" cy="22.5" rx="2.8" ry="1.6" fill="#0d100a" opacity="0.9"/>
  <!-- Muzzle -->
  <ellipse cx="16" cy="28" rx="5.5" ry="2.5" fill="#0d100a" opacity="0.22"/>
</svg>
