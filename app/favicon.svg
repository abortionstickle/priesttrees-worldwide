<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" fill="#0d100a"/>
  <!-- Ears -->
  <ellipse cx="4" cy="16" rx="3.5" ry="4.5" fill="#b8d42a"/>
  <ellipse cx="28" cy="16" rx="3.5" ry="4.5" fill="#b8d42a"/>
  <!-- Wide flat head -->
  <ellipse cx="16" cy="15" rx="11" ry="10" fill="#b8d42a"/>
  <!-- Heavy brow shadow -->
  <ellipse cx="16" cy="12" rx="8" ry="3.5" fill="#0d100a" opacity="0.45"/>
  <!-- Eyes -->
  <circle cx="12" cy="13" r="2" fill="#0d100a"/>
  <circle cx="20" cy="13" r="2" fill="#0d100a"/>
  <!-- Wide nose -->
  <ellipse cx="14" cy="18" rx="2.2" ry="1.8" fill="#0d100a" opacity="0.5"/>
  <ellipse cx="18" cy="18" rx="2.2" ry="1.8" fill="#0d100a" opacity="0.5"/>
</svg>
