<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" fill="#0d100a"/>
  <!-- Ears -->
  <circle cx="3.5" cy="19" r="3" fill="#b8d42a"/>
  <circle cx="28.5" cy="19" r="3" fill="#b8d42a"/>
  <!-- Sagittal crest -->
  <ellipse cx="16" cy="8" rx="5" ry="4" fill="#b8d42a"/>
  <!-- Main head — wide, heavy -->
  <ellipse cx="16" cy="19" rx="12" ry="10" fill="#b8d42a"/>
  <!-- Heavy brow ridge -->
  <ellipse cx="16" cy="15" rx="10" ry="4" fill="#0d100a" opacity="0.55"/>
  <!-- Eyes -->
  <circle cx="12" cy="15.5" r="2.2" fill="#0d100a"/>
  <circle cx="20" cy="15.5" r="2.2" fill="#0d100a"/>
  <!-- Wide flat nose -->
  <ellipse cx="13.5" cy="22" rx="2.5" ry="2" fill="#0d100a" opacity="0.6"/>
  <ellipse cx="18.5" cy="22" rx="2.5" ry="2" fill="#0d100a" opacity="0.6"/>
  <!-- Muzzle area -->
  <ellipse cx="16" cy="25" rx="5" ry="2.5" fill="#0d100a" opacity="0.3"/>
</svg>
