<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="#0d100a"/>
  <!-- Ears: wide, flat, clearly on the sides -->
  <ellipse cx="6" cy="31" rx="7" ry="9" fill="#b8d42a"/>
  <ellipse cx="58" cy="31" rx="7" ry="9" fill="#b8d42a"/>
  <!-- Head: very wide, flat-topped (sagittal crest), fills the frame -->
  <path d="M 32 6 C 40 6 52 10 54 20 C 56 30 54 48 50 54 C 44 60 20 60 14 54 C 10 48 8 30 10 20 C 12 10 24 6 32 6 Z" fill="#b8d42a"/>
  <!-- Flat sagittal crest across top -->
  <rect x="20" y="6" width="24" height="6" fill="#b8d42a"/>
  <!-- Brow ridge: heavy dark horizontal bar -->
  <rect x="14" y="26" width="36" height="9" rx="4" fill="#0d100a" opacity="0.55"/>
  <!-- Left eye -->
  <circle cx="22" cy="30" r="6" fill="#0d100a"/>
  <circle cx="22" cy="30" r="4" fill="#bf2c1e"/>
  <circle cx="21" cy="29" r="1.5" fill="#ff4d3a" opacity="0.8"/>
  <!-- Right eye -->
  <circle cx="42" cy="30" r="6" fill="#0d100a"/>
  <circle cx="42" cy="30" r="4" fill="#bf2c1e"/>
  <circle cx="41" cy="29" r="1.5" fill="#ff4d3a" opacity="0.8"/>
  <!-- Nose: wide and flat, centered -->
  <rect x="23" y="38" width="18" height="10" rx="6" fill="#8fba18" opacity="0.4"/>
  <ellipse cx="27" cy="42" rx="4" ry="3.5" fill="#0d100a" opacity="0.7"/>
  <ellipse cx="37" cy="42" rx="4" ry="3.5" fill="#0d100a" opacity="0.7"/>
  <!-- Mouth line -->
  <path d="M 20 52 Q 32 57 44 52" stroke="#0d100a" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
</svg>
