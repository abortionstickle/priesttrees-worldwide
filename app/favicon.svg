<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="#0d100a"/>
  <!-- Ears -->
  <circle cx="10" cy="30" r="7" fill="#b8d42a"/>
  <circle cx="54" cy="30" r="7" fill="#b8d42a"/>
  <!-- Skull: wide, flat top (sagittal crest), heavy jaw -->
  <path d="M 32 7 C 22 7 13 13 13 25 C 13 37 17 46 24 50 L 24 57 L 40 57 L 40 50 C 47 46 51 37 51 25 C 51 13 42 7 32 7 Z" fill="#b8d42a"/>
  <!-- Heavy brow ridge -->
  <path d="M 15 27 Q 32 21 49 27 L 48 33 Q 32 27 16 33 Z" fill="#0d100a" opacity="0.5"/>
  <!-- Eye sockets -->
  <ellipse cx="23" cy="29" rx="6" ry="5" fill="#0d100a"/>
  <ellipse cx="41" cy="29" rx="6" ry="5" fill="#0d100a"/>
  <!-- Glowing red eyes -->
  <circle cx="23" cy="29" r="3.5" fill="#c03020"/>
  <circle cx="41" cy="29" r="3.5" fill="#c03020"/>
  <circle cx="22" cy="28" r="1.4" fill="#ff5040" opacity="0.75"/>
  <circle cx="40" cy="28" r="1.4" fill="#ff5040" opacity="0.75"/>
  <!-- Wide flat nose -->
  <ellipse cx="32" cy="40" rx="9" ry="6" fill="#9ecb20" opacity="0.35"/>
  <ellipse cx="27" cy="41" rx="3.5" ry="3" fill="#0d100a" opacity="0.65"/>
  <ellipse cx="37" cy="41" rx="3.5" ry="3" fill="#0d100a" opacity="0.65"/>
  <!-- Mouth -->
  <path d="M 23 49 Q 32 54 41 49" stroke="#0d100a" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.45"/>
</svg>
